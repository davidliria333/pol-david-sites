<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Sophisticated background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    
    <!-- Central hexagon - more sophisticated -->
    <radialGradient id="hexGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="70%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:0.8" />
    </radialGradient>
    
    <!-- Clean connection lines -->
    <linearGradient id="connectionGradient">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:0.7" />
    </linearGradient>
    
    <!-- Refined node gradient -->
    <radialGradient id="nodeGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:0.9" />
    </radialGradient>
    
    <!-- Subtle shadow -->
    <filter id="subtleShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="0.5" flood-color="#1e293b" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Clean background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGradient)"/>
  
  <!-- Refined molecular structure -->
  <g transform="translate(16,16)">
    
    <!-- Central hexagon - cleaner and more prominent -->
    <polygon points="0,-5 4.3,-2.5 4.3,2.5 0,5 -4.3,2.5 -4.3,-2.5" 
             fill="url(#hexGradient)" 
             stroke="none"
             filter="url(#subtleShadow)"/>
    
    <!-- Clean molecular bonds - only essential connections -->
    <g stroke="url(#connectionGradient)" stroke-width="1.5" fill="none">
      <!-- Primary connections only -->
      <line x1="0" y1="-5" x2="0" y2="-10"/>
      <line x1="4.3" y1="-2.5" x2="8.5" y2="-5"/>
      <line x1="4.3" y1="2.5" x2="8.5" y2="5"/>
      <line x1="0" y1="5" x2="0" y2="10"/>
      <line x1="-4.3" y1="2.5" x2="-8.5" y2="5"/>
      <line x1="-4.3" y1="-2.5" x2="-8.5" y2="-5"/>
    </g>
    
    <!-- Refined outer nodes -->
    <g fill="url(#nodeGradient)" stroke="none">
      <circle cx="0" cy="-10" r="2.2" filter="url(#subtleShadow)"/>
      <circle cx="8.5" cy="-5" r="2.2" filter="url(#subtleShadow)"/>
      <circle cx="8.5" cy="5" r="2.2" filter="url(#subtleShadow)"/>
      <circle cx="0" cy="10" r="2.2" filter="url(#subtleShadow)"/>
      <circle cx="-8.5" cy="5" r="2.2" filter="url(#subtleShadow)"/>
      <circle cx="-8.5" cy="-5" r="2.2" filter="url(#subtleShadow)"/>
    </g>
    
    <!-- Central core - refined highlight -->
    <circle cx="0" cy="0" r="1.8" fill="url(#hexGradient)" opacity="0.8"/>
    <circle cx="-0.5" cy="-0.5" r="0.6" fill="#ffffff" opacity="0.8"/>
    
    <!-- Minimal data flow indicators -->
    <g fill="#ffffff" opacity="0.6">
      <circle cx="0" cy="-7.5" r="0.4"/>
      <circle cx="6.5" cy="-3.8" r="0.4"/>
      <circle cx="6.5" cy="3.8" r="0.4"/>
      <circle cx="0" cy="7.5" r="0.4"/>
      <circle cx="-6.5" cy="3.8" r="0.4"/>
      <circle cx="-6.5" cy="-3.8" r="0.4"/>
    </g>
  </g>
  
  <!-- Subtle brand mark -->
  <circle cx="26" cy="6" r="1.2" fill="#ffffff" opacity="0.3"/>
  <text x="26" y="6.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="1.6" fill="#ffffff" font-weight="600" opacity="0.8">A</text>
  
</svg>