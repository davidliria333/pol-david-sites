<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
    
    <!-- Eye gradient -->
    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </radialGradient>
    
    <!-- Pupil gradient -->
    <radialGradient id="pupilGradient" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </radialGradient>
    
    <!-- Circuit lines -->
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e5e7eb;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#f3f4f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="32" height="32" rx="6" fill="url(#bgGradient)"/>
  
  <!-- Circuit pattern lines extending from eye -->
  <g stroke="url(#circuitGradient)" stroke-width="1" fill="none" opacity="0.7">
    <!-- Upper circuit lines -->
    <path d="M 16 8 L 16 4 M 14 9 L 8 6 M 18 9 L 24 6"/>
    <path d="M 12 10 L 6 10 M 20 10 L 26 10"/>
    
    <!-- Lower circuit lines -->
    <path d="M 16 24 L 16 28 M 14 23 L 8 26 M 18 23 L 24 26"/>
    <path d="M 12 22 L 6 22 M 20 22 L 26 22"/>
    
    <!-- Side circuit connections -->
    <path d="M 8 16 L 4 16 M 24 16 L 28 16"/>
    
    <!-- Circuit nodes (small rectangles) -->
    <rect x="7" y="5.5" width="1" height="1" fill="url(#circuitGradient)"/>
    <rect x="23" y="5.5" width="1" height="1" fill="url(#circuitGradient)"/>
    <rect x="5.5" y="15.5" width="1" height="1" fill="url(#circuitGradient)"/>
    <rect x="25.5" y="15.5" width="1" height="1" fill="url(#circuitGradient)"/>
    <rect x="7" y="25.5" width="1" height="1" fill="url(#circuitGradient)"/>
    <rect x="23" y="25.5" width="1" height="1" fill="url(#circuitGradient)"/>
  </g>
  
  <!-- Eye shape -->
  <g transform="translate(16,16)">
    <!-- Eye outline -->
    <ellipse cx="0" cy="0" rx="9" ry="6" fill="url(#eyeGradient)" stroke="#c7d2fe" stroke-width="0.5"/>
    
    <!-- Iris -->
    <circle cx="0" cy="0" r="4" fill="url(#eyeGradient)" opacity="0.9"/>
    
    <!-- Pupil -->
    <circle cx="0" cy="0" r="2.5" fill="url(#pupilGradient)"/>
    
    <!-- Highlight/reflection -->
    <ellipse cx="-0.8" cy="-0.8" rx="1" ry="1.2" fill="#ffffff" opacity="0.8"/>
    <circle cx="1" cy="1" r="0.4" fill="#ffffff" opacity="0.6"/>
  </g>
  
  <!-- Tech accent - small AI indicator -->
  <circle cx="25" cy="7" r="1.5" fill="#f59e0b" opacity="0.9"/>
  <text x="25" y="7.8" text-anchor="middle" font-family="Arial, sans-serif" font-size="1.5" fill="#1e1b4b" font-weight="bold">AI</text>
</svg>