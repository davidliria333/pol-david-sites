<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="32" height="32" rx="6" fill="url(#bgGradient)"/>
  
  <!-- AI/Analytics symbol - stylized "A" with data bars -->
  <g transform="translate(6,4)">
    <!-- Letter "A" stylized -->
    <path d="M10 4 L15 20 L13 20 L12 17 L8 17 L7 20 L5 20 L10 4 Z M9 14 L11 14 L10 9 Z" fill="url(#iconGradient)" stroke="none"/>
    
    <!-- Data visualization bars -->
    <rect x="16" y="15" width="2" height="9" fill="url(#iconGradient)" opacity="0.8"/>
    <rect x="19" y="12" width="2" height="12" fill="url(#iconGradient)" opacity="0.9"/>
    <rect x="16" y="8" width="2" height="5" fill="url(#iconGradient)" opacity="0.6"/>
    <rect x="19" y="6" width="2" height="4" fill="url(#iconGradient)" opacity="0.7"/>
  </g>
</svg>