<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Premium white background -->
  <rect width="32" height="32" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.5"/>
  
  <!-- Molecular structure - centered -->
  <g transform="translate(16,16)">
    
    <!-- Central hexagon - sophisticated dark -->
    <polygon points="0,-4 3.5,-2 3.5,2 0,4 -3.5,2 -3.5,-2" 
             fill="#111827" 
             stroke="none"/>
    
    <!-- Minimal connection lines -->
    <g stroke="#6b7280" stroke-width="1" fill="none">
      <line x1="0" y1="-4" x2="0" y2="-8"/>
      <line x1="3.5" y1="-2" x2="7" y2="-4"/>
      <line x1="3.5" y1="2" x2="7" y2="4"/>
      <line x1="0" y1="4" x2="0" y2="8"/>
      <line x1="-3.5" y1="2" x2="-7" y2="4"/>
      <line x1="-3.5" y1="-2" x2="-7" y2="-4"/>
    </g>
    
    <!-- Outer nodes - refined dark circles -->
    <g fill="#374151" stroke="none">
      <circle cx="0" cy="-8" r="1.5"/>
      <circle cx="7" cy="-4" r="1.5"/>
      <circle cx="7" cy="4" r="1.5"/>
      <circle cx="0" cy="8" r="1.5"/>
      <circle cx="-7" cy="4" r="1.5"/>
      <circle cx="-7" cy="-4" r="1.5"/>
    </g>
    
    <!-- Central core - elegant white highlight -->
    <circle cx="0" cy="0" r="0.8" fill="#ffffff"/>
  </g>
</svg>