<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Sophisticated navy background -->
  <rect width="32" height="32" rx="6" fill="#1e293b"/>
  
  <!-- Molecular structure - centered -->
  <g transform="translate(16,16)">
    
    <!-- Central hexagon - elegant outline -->
    <polygon points="0,-4 3.5,-2 3.5,2 0,4 -3.5,2 -3.5,-2" 
             fill="#334155" 
             stroke="#e2e8f0" 
             stroke-width="1"/>
    
    <!-- Refined connection lines -->
    <g stroke="#64748b" stroke-width="1" fill="none" opacity="0.8">
      <line x1="0" y1="-4" x2="0" y2="-8"/>
      <line x1="3.5" y1="-2" x2="7" y2="-4"/>
      <line x1="3.5" y1="2" x2="7" y2="4"/>
      <line x1="0" y1="4" x2="0" y2="8"/>
      <line x1="-3.5" y1="2" x2="-7" y2="4"/>
      <line x1="-3.5" y1="-2" x2="-7" y2="-4"/>
    </g>
    
    <!-- Outer nodes - subtle elegance -->
    <g fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.5">
      <circle cx="0" cy="-8" r="1.5"/>
      <circle cx="7" cy="-4" r="1.5"/>
      <circle cx="7" cy="4" r="1.5"/>
      <circle cx="0" cy="8" r="1.5"/>
      <circle cx="-7" cy="4" r="1.5"/>
      <circle cx="-7" cy="-4" r="1.5"/>
    </g>
    
    <!-- Central core - refined highlight -->
    <circle cx="0" cy="0" r="1" fill="#f1f5f9"/>
  </g>
</svg>